services:
  - type: web
    name: blog-api
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn blog_api.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-domain.vercel.app" # User will need to update this

databases:
  - name: blog-db
    plan: free
